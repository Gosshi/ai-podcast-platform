name: Post Episode to Twitter/X

on:
  # Run after the daily-publish workflow completes, or manually
  workflow_run:
    workflows: ["Scheduled Daily Publish"]
    types: [completed]
  workflow_dispatch:

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && vars.ENABLE_X_AUTO_POST_WORKFLOW == 'true') }}
    steps:
      - name: Publish to Twitter/X
        id: publish
        run: |
          RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w '\n%{http_code}' \
            "${{ secrets.APP_BASE_URL }}/api/social/twitter-post")
          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)
          ERROR=$(echo "$BODY" | jq -r '.error // empty')

          if [ "$STATUS" = "200" ]; then
            echo "episode_id=$(echo "$BODY" | jq -r '.episodeId')" >> "$GITHUB_OUTPUT"
            echo "post_id=$(echo "$BODY" | jq -r '.postId')" >> "$GITHUB_OUTPUT"
            echo "post_url=$(echo "$BODY" | jq -r '.postUrl')" >> "$GITHUB_OUTPUT"
            echo "tweet=$(echo "$BODY" | jq -r '.tweet')" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$STATUS" = "503" ] && { [ "$ERROR" = "x_auto_post_disabled" ] || [ "$ERROR" = "x_credentials_not_configured" ]; }; then
            echo "Skipping X auto-post: $ERROR"
            echo "$BODY"
            exit 0
          fi

          echo "$BODY"
          exit 1

      - name: Report publish result
        if: steps.publish.outputs.post_id != ''
        run: |
          echo "Posted episode: ${{ steps.publish.outputs.episode_id }}"
          echo "---"
          echo "${{ steps.publish.outputs.tweet }}"
          echo "---"
          echo "Post URL: ${{ steps.publish.outputs.post_url }}"
